<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QueueSmart - Join Queue</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <h2 class="page-title">Join a queue</h2>
    <p class="page-sub">Pick a service below. Estimated wait is based on how many people are ahead of you.</p>

    <div class="card">
      <div id="serviceList"></div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    requireLogin("user");
    renderNavbar("join-queue.html");

    function render() {
      const services = getData("qs_services");
      const myQueue = getData("qs_myQueue");

      document.getElementById("serviceList").innerHTML = services
        .map(function (s) {
          const wait = s.queue.length * s.duration;
          const inThis = myQueue && myQueue.serviceId === s.id;

          let action;
          if (inThis) {
            action = '<button class="btn small danger" onclick="leaveQueue()">Leave queue</button>';
          } else if (!s.open) {
            action = '<span class="badge closed">Closed</span>';
          } else if (myQueue) {
            // already in a different queue, one at a time
            action = '<button class="btn small" disabled>Join</button>';
          } else {
            action = '<button class="btn small" onclick="joinQueue(' + s.id + ')">Join</button>';
          }

          return '<div class="service-row"><div class="info">' +
            "<h4>" + s.name + "</h4>" +
            "<p>" + s.description + "</p>" +
            '<p class="muted">' + s.queue.length + " in line &middot; est. wait ~" + wait + " min</p>" +
            "</div>" + action + "</div>";
        })
        .join("");
    }

    function joinQueue(id) {
      const services = getData("qs_services");
      const svc = services.find(function (s) { return s.id === id; });
      svc.queue.push("You");
      setData("qs_services", services);
      setData("qs_myQueue", { serviceId: id, position: svc.queue.length, status: "waiting" });
      addNotification("You joined the queue for " + svc.name + ".");
      window.location.href = "queue-status.html";
    }

    function leaveQueue() {
      const myQueue = getData("qs_myQueue");
      const services = getData("qs_services");
      const svc = services.find(function (s) { return s.id === myQueue.serviceId; });
      svc.queue = svc.queue.filter(function (n) { return n !== "You"; });
      setData("qs_services", services);
      localStorage.removeItem("qs_myQueue");

      // record it in history
      const hist = getData("qs_history");
      hist.unshift({ date: new Date().toISOString().slice(0, 10), service: svc.name, outcome: "Left queue" });
      setData("qs_history", hist);

      addNotification("You left the queue for " + svc.name + ".");
      render();
      renderNotifs();
    }

    render();
  </script>
</body>
</html>
