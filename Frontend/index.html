<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QueueSmart - Login</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="logo">QueueSmart</div>
      <p class="tagline">Skip the line, not the service.</p>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com">
        <div class="error"></div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Your password">
        <div class="error"></div>
      </div>

      <button class="btn full" onclick="doLogin()">Log in</button>

      <p class="auth-switch">New here? <a href="register.html">Create an account</a></p>

      <div class="demo-note">
        <strong>Demo accounts:</strong><br>
        User: user@demo.com / user1234<br>
        Admin: admin@demo.com / admin1234
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    function doLogin() {
      const email = document.getElementById("email");
      const password = document.getElementById("password");
      let ok = true;

      clearInvalid(email);
      clearInvalid(password);

      if (email.value.trim() === "") {
        setInvalid(email, "Email is required.");
        ok = false;
      } else if (!isValidEmail(email.value.trim())) {
        setInvalid(email, "Enter a valid email address.");
        ok = false;
      }

      if (password.value === "") {
        setInvalid(password, "Password is required.");
        ok = false;
      }

      if (!ok) return;

      // check against demo accounts + anyone who registered this session
      const registered = getData("qs_registered") || [];
      const all = DEMO_ACCOUNTS.concat(registered);
      const match = all.find(function (a) {
        return a.email === email.value.trim().toLowerCase() && a.password === password.value;
      });

      if (!match) {
        setInvalid(password, "Incorrect email or password.");
        return;
      }

      setSession({ email: match.email, name: match.name, role: match.role });
      window.location.href = match.role === "admin" ? "admin-dashboard.html" : "dashboard.html";
    }
  </script>
</body>
</html>
