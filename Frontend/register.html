<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QueueSmart - Register</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="logo">QueueSmart</div>
      <p class="tagline">Create your account</p>

      <div class="form-group">
        <label for="name">Full name</label>
        <input type="text" id="name" maxlength="60" placeholder="Jane Doe">
        <div class="error"></div>
      </div>

      <div class="form-group">
        <label for="email">Email (used as your username)</label>
        <input type="email" id="email" placeholder="you@example.com">
        <div class="error"></div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="At least 8 characters">
        <div class="error"></div>
      </div>

      <div class="form-group">
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" placeholder="Repeat your password">
        <div class="error"></div>
      </div>

      <button class="btn full" onclick="doRegister()">Create account</button>

      <p class="auth-switch">Already have an account? <a href="index.html">Log in</a></p>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    function doRegister() {
      const name = document.getElementById("name");
      const email = document.getElementById("email");
      const password = document.getElementById("password");
      const confirm = document.getElementById("confirm");
      let ok = true;

      [name, email, password, confirm].forEach(clearInvalid);

      if (name.value.trim() === "") {
        setInvalid(name, "Name is required.");
        ok = false;
      }

      if (email.value.trim() === "") {
        setInvalid(email, "Email is required.");
        ok = false;
      } else if (!isValidEmail(email.value.trim())) {
        setInvalid(email, "Enter a valid email address.");
        ok = false;
      }

      if (password.value.length < 8) {
        setInvalid(password, "Password must be at least 8 characters.");
        ok = false;
      }

      if (confirm.value !== password.value) {
        setInvalid(confirm, "Passwords do not match.");
        ok = false;
      }

      if (!ok) return;

      // make sure the email isn't taken already
      const registered = getData("qs_registered") || [];
      const all = DEMO_ACCOUNTS.concat(registered);
      const taken = all.some(function (a) { return a.email === email.value.trim().toLowerCase(); });
      if (taken) {
        setInvalid(email, "An account with this email already exists.");
        return;
      }

      registered.push({
        email: email.value.trim().toLowerCase(),
        password: password.value,
        name: name.value.trim(),
        role: "user"
      });
      setData("qs_registered", registered);

      // log them straight in
      setSession({ email: email.value.trim().toLowerCase(), name: name.value.trim(), role: "user" });
      addNotification("Account created. Welcome to QueueSmart!");
      window.location.href = "dashboard.html";
    }
  </script>
</body>
</html>
