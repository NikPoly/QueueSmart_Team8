<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QueueSmart - Queue Management</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <h2 class="page-title">Queue management</h2>
    <p class="page-sub">Pick a service to view and manage its queue.</p>

    <div class="card">
      <div class="form-group">
        <label for="serviceSelect">Service</label>
        <select id="serviceSelect" onchange="render()"></select>
        <div class="error"></div>
      </div>
    </div>

    <div class="card">
      <h3 id="queueTitle">Queue</h3>
      <button class="btn small" id="serveBtn" onclick="serveNext()">Serve next user</button>
      <table class="mt">
        <thead>
          <tr><th>#</th><th>Name</th><th>Actions</th></tr>
        </thead>
        <tbody id="queueBody"></tbody>
      </table>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    requireLogin("admin");
    renderNavbar("admin-queues.html");

    // fill the dropdown once
    const select = document.getElementById("serviceSelect");
    getData("qs_services").forEach(function (s) {
      const opt = document.createElement("option");
      opt.value = s.id;
      opt.textContent = s.name;
      select.appendChild(opt);
    });

    function currentService() {
      const services = getData("qs_services");
      return services.find(function (s) { return s.id === parseInt(select.value, 10); });
    }

    function render() {
      const svc = currentService();
      document.getElementById("queueTitle").textContent =
        svc.name + " (" + svc.queue.length + " waiting)";
      document.getElementById("serveBtn").disabled = svc.queue.length === 0;

      const body = document.getElementById("queueBody");
      if (svc.queue.length === 0) {
        body.innerHTML = '<tr><td colspan="3" class="muted">Queue is empty.</td></tr>';
        return;
      }

      body.innerHTML = svc.queue
        .map(function (name, i) {
          return "<tr><td>" + (i + 1) + "</td><td>" + name + "</td><td>" +
            '<button class="btn small secondary" onclick="move(' + i + ',-1)" ' + (i === 0 ? "disabled" : "") + ">&uarr;</button> " +
            '<button class="btn small secondary" onclick="move(' + i + ',1)" ' + (i === svc.queue.length - 1 ? "disabled" : "") + ">&darr;</button> " +
            '<button class="btn small danger" onclick="removeUser(' + i + ')">Remove</button>' +
            "</td></tr>";
        })
        .join("");
    }

    // saves changes to whichever service is selected
    function saveService(svc) {
      const services = getData("qs_services");
      const idx = services.findIndex(function (s) { return s.id === svc.id; });
      services[idx] = svc;
      setData("qs_services", services);
    }

    function move(i, dir) {
      const svc = currentService();
      const j = i + dir;
      const tmp = svc.queue[i];
      svc.queue[i] = svc.queue[j];
      svc.queue[j] = tmp;
      saveService(svc);
      render();
    }

    function removeUser(i) {
      const svc = currentService();
      const removed = svc.queue.splice(i, 1)[0];
      saveService(svc);
      addNotification(removed + " was removed from the " + svc.name + " queue.");
      renderNotifs();
      render();
    }

    // UI simulation - just pops the first person off
    function serveNext() {
      const svc = currentService();
      const served = svc.queue.shift();
      saveService(svc);
      addNotification(served + " is now being served at " + svc.name + ".");
      renderNotifs();
      render();
    }

    render();
  </script>
</body>
</html>
